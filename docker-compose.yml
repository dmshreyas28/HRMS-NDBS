version: '3.9'
services:
  api:
    build: 
      context: ./server/HRMS.API
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file: ./server/HRMS.API/.env
    depends_on:
      - mongo

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file: ./client/.env
    volumes:
      - ./client/src:/app/src
    depends_on:
      - api

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: